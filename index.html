<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧬 SoulDNA AI — Discover Your Hidden Personality</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg:       #060609;
      --s1:       rgba(255,255,255,0.04);
      --s2:       rgba(255,255,255,0.08);
      --b1:       rgba(255,255,255,0.10);
      --b2:       rgba(255,255,255,0.18);
      --text:     #f0eee8;
      --muted:    rgba(240,238,232,0.50);
      --accent:   #c8a96e;
      --accent2:  #e8c99e;
      --glow:     rgba(200,169,110,0.30);
      --teal:     #70c8b8;
      --purple:   #b070e0;
      --red:      #e07878;
      --serif:    'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      --sans:     'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      --mono:     'Space Mono', 'Courier New', Courier, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,169,110,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(112,200,184,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 55% 40%, rgba(176,112,224,0.05) 0%, transparent 55%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ══════════════ SCREENS ══════════════ */
    .screen {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
    }
    .screen.hidden { display: none !important; }

    /* ══════════════ BUTTONS ══════════════ */
    .btn-gold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #c8a96e 0%, #a07438 100%);
      color: #0a0805;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 1.02rem;
      letter-spacing: 0.04em;
      padding: 1rem 2.6rem;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      box-shadow: 0 0 32px rgba(200,169,110,0.40), 0 4px 20px rgba(0,0,0,0.42);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
    }
    .btn-gold::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 100%);
      border-radius: 100px;
      pointer-events: none;
    }
    .btn-gold:hover  { transform: translateY(-2px) scale(1.025); box-shadow: 0 0 50px rgba(200,169,110,0.52), 0 8px 28px rgba(0,0,0,0.50); }
    .btn-gold:active { transform: scale(0.97); }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.88rem 2rem;
      border-radius: 100px;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.10); border-color: var(--accent); color: var(--accent); }

    /* ══════════════════════════════════════════
       LANDING
    ══════════════════════════════════════════ */
    #s-landing { text-align: center; gap: 0; }

    .l-icon {
      display: block;
      font-size: 4rem;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 0 22px rgba(200,169,110,0.60));
      animation: iconFloat 3.2s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-13px); }
    }

    .l-title {
      font-family: var(--serif);
      font-size: clamp(3rem, 10vw, 6.2rem);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.025em;
      margin-bottom: 1.1rem;
      background: linear-gradient(140deg, #e8c99e 0%, #c8a96e 45%, #9a7238 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: #c8a96e;
      filter: drop-shadow(0 0 30px rgba(200,169,110,0.20));
    }

    .l-sub {
      font-family: var(--serif);
      font-size: clamp(1.05rem, 3.5vw, 1.6rem);
      font-weight: 300;
      font-style: italic;
      color: rgba(240,238,232,0.55);
      letter-spacing: 0.045em;
      margin-bottom: 2.2rem;
    }

    .l-card {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 18px;
      padding: 1.5rem 2.2rem;
      max-width: 490px;
      margin: 0 auto 2.8rem;
      font-size: clamp(0.9rem, 2.4vw, 1rem);
      line-height: 1.78;
      color: rgba(240,238,232,0.70);
      position: relative;
      overflow: hidden;
    }
    .l-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .l-arrow {
      display: block;
      font-size: 1.7rem;
      color: var(--accent);
      margin-bottom: 1.7rem;
      animation: arrowBounce 1.5s ease-in-out infinite;
    }
    @keyframes arrowBounce {
      0%,100% { transform: translateY(0px);  opacity: 0.55; }
      50%      { transform: translateY(10px); opacity: 1.0;  }
    }

    .l-stats {
      display: flex;
      gap: 2.8rem;
      justify-content: center;
      margin-top: 3rem;
      flex-wrap: wrap;
    }
    .l-stat {
      text-align: center;
      font-size: 0.70rem;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(240,238,232,0.38);
    }
    .l-stat strong {
      display: block;
      font-family: var(--mono);
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 0.22rem;
    }

    /* ══════════════════════════════════════════
       QUIZ
    ══════════════════════════════════════════ */
    #s-quiz {
      justify-content: flex-start;
      padding-top: 2.8rem;
      padding-bottom: 2.8rem;
    }

    .quiz-header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 1.6rem;
    }

    .quiz-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.9rem;
    }

    .quiz-section-tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(200,169,110,0.10);
      border: 1px solid rgba(200,169,110,0.25);
      padding: 0.28rem 0.82rem;
      border-radius: 100px;
    }

    .quiz-counter {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .progress-track {
      width: 100%;
      height: 2.5px;
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px rgba(200,169,110,0.55);
    }

    /* Question Card */
    .quiz-card {
      width: 100%;
      max-width: 640px;
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 24px;
      padding: 2.6rem 2.4rem 2.4rem;
      position: relative;
      overflow: hidden;
    }
    .quiz-card::before {
      content: '';
      position: absolute;
      top: 0; left: 6%; right: 6%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .quiz-card.leaving {
      animation: cardLeave 0.26s ease forwards;
    }
    .quiz-card.entering {
      animation: cardEnter 0.32s ease forwards;
    }
    @keyframes cardLeave {
      from { opacity: 1; transform: translateY(0px) scale(1);    }
      to   { opacity: 0; transform: translateY(-16px) scale(0.97); }
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0px) scale(1);    }
    }

    .q-label {
      font-family: var(--mono);
      font-size: 0.64rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .q-text {
      font-family: var(--serif);
      font-size: clamp(1.38rem, 3.8vw, 1.95rem);
      font-weight: 600;
      line-height: 1.30;
      color: var(--text);
      margin-bottom: 2.2rem;
      letter-spacing: -0.01em;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 0.82rem;
    }

    .opt {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 1.05rem 1.35rem;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.96rem;
      font-weight: 400;
      color: rgba(240,238,232,0.88);
      text-align: left;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.17s ease, background 0.17s ease, transform 0.17s ease, box-shadow 0.17s ease;
      line-height: 1.45;
    }
    .opt:hover    { border-color: var(--accent); background: rgba(200,169,110,0.09); transform: translateX(5px); }
    .opt.selected { border-color: var(--accent); background: rgba(200,169,110,0.15); transform: translateX(5px); box-shadow: 0 0 20px rgba(200,169,110,0.20); }
    .opt:disabled { cursor: not-allowed; opacity: 0.6; }

    .opt-key {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.10em;
      color: var(--accent);
      opacity: 0.65;
      min-width: 16px;
      margin-top: 0.15rem;
      flex-shrink: 0;
    }

    .opt-body { flex: 1; }

    /* ══════════════════════════════════════════
       LOADING
    ══════════════════════════════════════════ */
    #s-loading { gap: 2rem; text-align: center; }

    .load-orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #e8c99e, #c8a96e 40%, #5030a0 100%);
      box-shadow: 0 0 40px rgba(200,169,110,0.45), 0 0 80px rgba(80,48,160,0.25);
      animation: orbPulse 2.2s ease-in-out infinite;
      position: relative;
      flex-shrink: 0;
    }
    .load-orb::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(200,169,110,0.28);
      animation: orbRing 2.2s ease-in-out infinite;
    }
    @keyframes orbPulse { 0%,100% { transform: scale(1.0); } 50% { transform: scale(1.09); } }
    @keyframes orbRing  { 0%,100% { transform: scale(1.0); opacity: 0.28; } 50% { transform: scale(1.35); opacity: 0; } }

    .load-title {
      font-family: var(--serif);
      font-size: clamp(1.45rem, 4.5vw, 2.2rem);
      font-weight: 600;
      line-height: 1.35;
      max-width: 390px;
    }

    .load-steps {
      display: flex;
      flex-direction: column;
      gap: 0.58rem;
      max-width: 310px;
      width: 100%;
      text-align: left;
    }
    .load-step {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.45s ease, color 0.45s ease;
    }
    .load-step.lit { opacity: 1; color: var(--text); }
    .load-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .load-dots { display: flex; gap: 0.45rem; }
    .ldot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: ldotBlink 1.4s ease-in-out infinite;
    }
    .ldot:nth-child(2) { animation-delay: 0.2s; }
    .ldot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes ldotBlink {
      0%,80%,100% { opacity: 0.20; transform: scale(0.75); }
      40%          { opacity: 1.00; transform: scale(1.22); }
    }

    /* ══════════════════════════════════════════
       PREVIEW / RESULT TEASER
    ══════════════════════════════════════════ */
    #s-preview {
      text-align: center;
      padding: 3rem 1.5rem;
      justify-content: flex-start;
    }

    .prev-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--mono);
      font-size: 0.64rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(200,169,110,0.30);
      background: rgba(200,169,110,0.08);
      padding: 0.32rem 0.88rem;
      border-radius: 100px;
      margin-bottom: 1.8rem;
      margin-top: 0.5rem;
    }

    .prev-title {
      font-family: var(--serif);
      font-size: clamp(1.75rem, 5.5vw, 3rem);
      font-weight: 700;
      line-height: 1.18;
      max-width: 520px;
      margin: 0 auto 1.2rem;
      letter-spacing: -0.02em;
    }
    .prev-title em { color: var(--accent); font-style: normal; }

    .prev-sub {
      font-size: 0.90rem;
      color: var(--muted);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.72;
    }
    .prev-sub strong { color: var(--accent2); }

    .prev-card {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 20px;
      padding: 1.8rem 2rem;
      max-width: 520px;
      width: 100%;
      margin: 1.6rem auto;
      position: relative;
      overflow: hidden;
    }
    .prev-card::before {
      content: '';
      position: absolute;
      top: 0; left: 8%; right: 8%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .teaser-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.82rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 0.88rem;
    }
    .teaser-row:last-child { border-bottom: none; }
    .teaser-lbl  { color: var(--muted); }
    .teaser-val  {
      -webkit-filter: blur(7px);
      filter: blur(7px);
      color: var(--accent2);
      font-weight: 600;
      font-family: var(--mono);
      font-size: 0.80rem;
      letter-spacing: 0.05em;
      user-select: none;
      -webkit-user-select: none;
    }

    .lock-layer {
      background: linear-gradient(180deg, transparent 0%, rgba(6,6,9,0.94) 55%);
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 56%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 1.3rem;
      gap: 0.38rem;
    }
    .lock-emoji { font-size: 1.45rem; }
    .lock-txt   { font-size: 0.76rem; color: var(--muted); }

    .prev-price {
      font-family: var(--serif);
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: var(--muted);
      margin: 1.5rem 0 0.55rem;
    }
    .prev-price strong { color: var(--accent2); font-size: 1.35em; }

    .prev-urgency {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(224,120,120,0.80);
      margin-top: 1rem;
    }

    /* ══════════════════════════════════════════
       PAYMENT
    ══════════════════════════════════════════ */
    #s-payment { gap: 0; }

    .pay-card {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 24px;
      padding: 2.5rem 2.2rem;
      max-width: 430px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .pay-card::before {
      content: '';
      position: absolute;
      top: 0; left: 8%; right: 8%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .pay-title { font-family: var(--serif); font-size: 1.9rem; font-weight: 600; margin-bottom: 0.45rem; }
    .pay-sub   { font-size: 0.87rem; color: var(--muted); margin-bottom: 1.8rem; line-height: 1.55; }

    .qr-wrap {
      width: 180px; height: 180px;
      background: #ffffff;
      border-radius: 14px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 28px rgba(200,169,110,0.30);
    }
    .qr-wrap svg { width: 100%; height: 100%; display: block; }

    .pay-amount  { font-family: var(--mono); font-size: 2.1rem; font-weight: 700; color: var(--accent); margin-bottom: 0.25rem; }
    .pay-label   { font-size: 0.70rem; letter-spacing: 0.10em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.35rem; }
    .pay-upi     { font-family: var(--mono); font-size: 0.73rem; color: var(--muted); background: rgba(255,255,255,0.04); border: 1px solid var(--b1); border-radius: 8px; padding: 0.55rem 0.9rem; margin-bottom: 1.8rem; letter-spacing: 0.05em; }

    /* ══════════════════════════════════════════
       RESULT
    ══════════════════════════════════════════ */
    #s-result {
      padding: 2.8rem 1.5rem 4rem;
      justify-content: flex-start;
      align-items: center;
    }

    .result-wrap { max-width: 680px; width: 100%; }

    /* Hero */
    .r-hero {
      text-align: center;
      padding: 2.8rem 2rem;
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 24px;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
    }
    .r-hero::before {
      content: '';
      position: absolute;
      top: 0; left: 4%; right: 4%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      border-radius: 2px;
    }

    .r-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.63rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(200,169,110,0.28);
      background: rgba(200,169,110,0.08);
      padding: 0.33rem 0.95rem;
      border-radius: 100px;
      margin-bottom: 1.3rem;
    }

    .r-type {
      font-family: var(--serif);
      font-size: clamp(2rem, 7vw, 3.8rem);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.025em;
      margin-bottom: 1.2rem;
      background: linear-gradient(135deg, #e8c99e 0%, #c8a96e 45%, var(--teal) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: #c8a96e;
    }

    .r-desc {
      font-size: 0.97rem;
      line-height: 1.80;
      color: rgba(240,238,232,0.78);
      max-width: 510px;
      margin: 0 auto;
    }

    .r-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    .chip {
      font-family: var(--mono);
      font-size: 0.63rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 0.33rem 0.88rem;
      border-radius: 100px;
      border: 1px solid;
    }
    .chip-g { color: var(--accent);  border-color: rgba(200,169,110,0.32); background: rgba(200,169,110,0.08); }
    .chip-t { color: var(--teal);    border-color: rgba(112,200,184,0.30); background: rgba(112,200,184,0.07); }
    .chip-p { color: var(--purple);  border-color: rgba  text-transform: uppercase;
  color: rgba(240,238,232,0.45);
}
.stat strong {
  display: block;
  font-family: var(--mono);
  font-size: 1.1rem;
  color: #c8a96e;
  margin-bottom: 0.2rem;
}

/* ── BUTTONS ── */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  background: linear-gradient(135deg, #c8a96e 0%, #a07840 100%);
  color: #0a0805;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 1rem;
  letter-spacing: 0.04em;
  padding: 0.95rem 2.4rem;
  border: none;

}
.loading-orb::after {
  content: '';
  position: absolute;
  inset: -7px;
  border-radius: 50%;
  border: 1px solid rgba(200,169,110,0.28);
  animation: orbRing 2s ease-in-out infinite;
}
@keyframes orbPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes orbRing  { 0%,100% { transform: scale(1); opacity: 0.28; } 50% { transform: scale(1.32); opacity: 0; } }

.loading-title {
  font-family: var(--serif);
  font-size: clamp(1.4rem, 4.5vw, 2.1rem);

}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBlink {
  0%,80%,100% { opacity: 0.2; transform: scale(0.75); }
  40%          { opacity: 1;   transform: scale(1.2);  }
}
