<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulDNA AI</title>
<style>
/* ── FONTS: Google Fonts via @import (works in browsers with internet, gracefully degrades) ── */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #050508;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.10);
  --border2: rgba(255,255,255,0.18);
  --text: #f0eee8;
  --muted: rgba(240,238,232,0.50);
  --accent: #c8a96e;
  --accent2: #e8c99e;
  --glow: rgba(200,169,110,0.27);
  --teal: #70c8b8;
  --purple: #b070e0;
  --serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'Space Mono', 'Courier New', Courier, monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  min-height: 100%;
}

body {
  font-family: var(--sans);
  background-color: #050508;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,169,110,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(112,200,184,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 60% 40%, rgba(176,112,224,0.04) 0%, transparent 60%);
  background-attachment: fixed;
  color: var(--text);
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.25rem;
  position: relative;
}
.screen.hidden { display: none !important; }

/* ══════════════════════════════════════
   LANDING
══════════════════════════════════════ */
#landing { text-align: center; gap: 0; }

.dna-icon {
  display: block;
  font-size: 3.5rem;
  margin-bottom: 1.4rem;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 18px rgba(200,169,110,0.5));
}
@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-10px); }
}

.brand-title {
  font-family: var(--serif);
  font-size: clamp(2.8rem, 9vw, 5.5rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 1.1rem;
  background: linear-gradient(135deg, #e8c99e 0%, #c8a96e 45%, #a07840 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  color: #c8a96e; /* fallback for browsers without gradient text */
}

.brand-sub {
  font-family: var(--serif);
  font-size: clamp(1rem, 3vw, 1.5rem);
  font-weight: 300;
  font-style: italic;
  color: rgba(240,238,232,0.55);
  letter-spacing: 0.04em;
  margin-bottom: 2rem;
}

.tagline-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 16px;
  padding: 1.3rem 1.8rem;
  max-width: 460px;
  margin: 0 auto 2.8rem;
  font-size: clamp(0.88rem, 2.3vw, 1rem);
  line-height: 1.72;
  color: rgba(240,238,232,0.72);
  position: relative;
}
.tagline-card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, #c8a96e, transparent);
  border-radius: 1px;
}

.arrow-bounce {
  display: block;
  font-size: 1.4rem;
  color: #c8a96e;
  margin-bottom: 1.4rem;
  animation: abounce 1.5s ease-in-out infinite;
}
@keyframes abounce {
  0%, 100% { transform: translateY(0); opacity: 0.55; }
  50%       { transform: translateY(7px); opacity: 1; }
}

.stats-row {
  display: flex;
  gap: 2.2rem;
  justify-content: center;
  margin-top: 2.8rem;
  flex-wrap: wrap;
}
.stat {
  text-align: center;
  font-family: var(--sans);
  font-size: 0.75rem;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: rgba(240,238,232,0.45);
}
.stat strong {
  display: block;
  font-family: var(--mono);
  font-size: 1.1rem;
  color: #c8a96e;
  margin-bottom: 0.2rem;
}

/* ── BUTTONS ── */
.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  background: linear-gradient(135deg, #c8a96e 0%, #a07840 100%);
  color: #0a0805;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 1rem;
  letter-spacing: 0.04em;
  padding: 0.95rem 2.4rem;
  border: none;
  border-radius: 100px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  box-shadow: 0 0 28px rgba(200,169,110,0.35), 0 4px 18px rgba(0,0,0,0.4);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  text-decoration: none;
  position: relative;
}
.btn-primary:hover  { transform: translateY(-2px) scale(1.02); box-shadow: 0 0 44px rgba(200,169,110,0.45), 0 8px 28px rgba(0,0,0,0.5); }
.btn-primary:active { transform: scale(0.97); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 500;
  font-size: 0.95rem;
  padding: 0.85rem 1.9rem;
  border-radius: 100px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.18s ease;
  text-decoration: none;
}
.btn-ghost:hover { background: rgba(255,255,255,0.11); border-color: #c8a96e; color: #c8a96e; }

/* ══════════════════════════════════════
   QUIZ
══════════════════════════════════════ */
#quiz { padding-top: 1.5rem; padding-bottom: 2rem; gap: 0; justify-content: flex-start; padding-top: 3rem; }

.quiz-header { width: 100%; max-width: 600px; margin-bottom: 1.4rem; }

.section-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}
.section-name {
  font-family: var(--mono);
  font-size: 0.69rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #c8a96e;
  background: rgba(200,169,110,0.09);
  border: 1px solid rgba(200,169,110,0.22);
  padding: 0.28rem 0.75rem;
  border-radius: 100px;
}
.q-counter {
  font-family: var(--mono);
  font-size: 0.69rem;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.progress-track {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.07);
  border-radius: 100px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #c8a96e, #e8c99e);
  border-radius: 100px;
  transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 8px rgba(200,169,110,0.5);
  width: 0%;
}

.quiz-card {
  width: 100%;
  max-width: 600px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 22px;
  padding: 2.2rem 1.9rem;
  position: relative;
}
.quiz-card::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, #c8a96e, transparent);
  border-radius: 1px;
}
.quiz-card.fade-out {
  opacity: 0;
  transform: translateY(-10px) scale(0.985);
  transition: opacity 0.28s ease, transform 0.28s ease;
}
.quiz-card.fade-in {
  animation: qFadeIn 0.32s ease forwards;
}
@keyframes qFadeIn {
  from { opacity: 0; transform: translateY(14px) scale(0.985); }
  to   { opacity: 1; transform: translateY(0)   scale(1); }
}

.q-number {
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.9rem;
}
.q-text {
  font-family: var(--serif);
  font-size: clamp(1.35rem, 3.8vw, 1.85rem);
  font-weight: 600;
  line-height: 1.32;
  color: var(--text);
  margin-bottom: 1.9rem;
  letter-spacing: -0.01em;
}

.options-grid { display: flex; flex-direction: column; gap: 0.8rem; }

.opt-btn {
  display: flex;
  align-items: center;
  gap: 0.9rem;
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 13px;
  padding: 1rem 1.3rem;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 0.98rem;
  font-weight: 400;
  color: var(--text);
  text-align: left;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.18s, background 0.18s, transform 0.18s;
}
.opt-btn:hover   { border-color: #c8a96e; background: rgba(200,169,110,0.08); transform: translateX(4px); }
.opt-btn.selected { border-color: #c8a96e; background: rgba(200,169,110,0.14); box-shadow: 0 0 18px rgba(200,169,110,0.22); transform: translateX(4px); }

.opt-label {
  font-family: var(--mono);
  font-size: 0.66rem;
  letter-spacing: 0.1em;
  color: #c8a96e;
  opacity: 0.7;
  min-width: 16px;
  flex-shrink: 0;
}
.opt-text { flex: 1; line-height: 1.4; }

/* ══════════════════════════════════════
   LOADING
══════════════════════════════════════ */
#loading { gap: 1.8rem; text-align: center; }

.loading-orb {
  width: 76px; height: 76px;
  border-radius: 50%;
  background: radial-gradient(circle at 32% 32%, #e8c99e, #c8a96e 40%, #6040a0 100%);
  box-shadow: 0 0 38px rgba(200,169,110,0.4);
  animation: orbPulse 2s ease-in-out infinite;
  position: relative;
}
.loading-orb::after {
  content: '';
  position: absolute;
  inset: -7px;
  border-radius: 50%;
  border: 1px solid rgba(200,169,110,0.28);
  animation: orbRing 2s ease-in-out infinite;
}
@keyframes orbPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
@keyframes orbRing  { 0%,100% { transform: scale(1); opacity: 0.28; } 50% { transform: scale(1.32); opacity: 0; } }

.loading-title {
  font-family: var(--serif);
  font-size: clamp(1.4rem, 4.5vw, 2.1rem);
  font-weight: 600;
  line-height: 1.35;
  max-width: 380px;
}

.analysis-steps {
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  max-width: 300px;
  width: 100%;
  text-align: left;
}
.step {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 0.84rem;
  color: var(--muted);
  opacity: 0;
  transition: opacity 0.45s ease;
  letter-spacing: 0.02em;
}
.step.active { opacity: 1; color: var(--text); }
.step-dot { width: 5px; height: 5px; border-radius: 50%; background: #c8a96e; flex-shrink: 0; }

.loading-dots { display: flex; gap: 0.45rem; justify-content: center; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #c8a96e;
  animation: dotBlink 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBlink {
  0%,80%,100% { opacity: 0.2; transform: scale(0.75); }
  40%          { opacity: 1;   transform: scale(1.2);  }
}

/* ══════════════════════════════════════
   PREVIEW
══════════════════════════════════════ */
#preview { gap: 0; text-align: center; padding: 3rem 1.25rem; justify-content: flex-start; }

.preview-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  font-family: var(--mono);
  font-size: 0.66rem;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: #c8a96e;
  border: 1px solid rgba(200,169,110,0.28);
  background: rgba(200,169,110,0.08);
  padding: 0.32rem 0.85rem;
  border-radius: 100px;
  margin-bottom: 1.8rem;
  margin-top: 0.5rem;
}

.preview-title {
  font-family: var(--serif);
  font-size: clamp(1.7rem, 5.5vw, 2.8rem);
  font-weight: 700;
  line-height: 1.18;
  max-width: 500px;
  margin: 0 auto 1.3rem;
  letter-spacing: -0.02em;
}
.preview-title span { color: #c8a96e; }

.preview-sub {
  color: var(--muted);
  font-size: 0.9rem;
  max-width: 400px;
  margin: 0 auto;
  line-height: 1.72;
}
.preview-sub strong { color: #e8c99e; }

.preview-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 18px;
  padding: 1.8rem;
  max-width: 500px;
  width: 100%;
  margin: 1.4rem auto;
  position: relative;
  overflow: hidden;
}
.preview-card::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, #c8a96e, transparent);
}

.teaser-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  font-size: 0.88rem;
}
.teaser-row:last-child { border-bottom: none; }
.teaser-label { color: var(--muted); }
.teaser-blur {
  -webkit-filter: blur(6px);
  filter: blur(6px);
  color: #e8c99e;
  font-weight: 600;
  font-family: var(--mono);
  font-size: 0.82rem;
  letter-spacing: 0.05em;
  user-select: none;
}

.lock-overlay {
  background: linear-gradient(180deg, transparent 0%, rgba(5,5,8,0.92) 55%);
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 58%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 1.3rem;
  gap: 0.4rem;
}
.lock-icon { font-size: 1.4rem; }
.lock-text  { font-size: 0.78rem; color: var(--muted); }

.price-tag {
  font-family: var(--serif);
  font-size: clamp(0.95rem, 2.5vw, 1.15rem);
  color: var(--muted);
  margin: 1.4rem 0 0.5rem;
}
.price-tag strong { color: #e8c99e; font-size: 1.35em; }

.urgency {
  font-family: var(--mono);
  font-size: 0.72rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: rgba(224,112,112,0.78);
  margin-top: 0.9rem;
}

/* ══════════════════════════════════════
   PAYMENT
══════════════════════════════════════ */
#payment { gap: 0; }

.payment-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 22px;
  padding: 2.3rem 1.9rem;
  max-width: 420px;
  width: 100%;
  text-align: center;
  position: relative;
}
.payment-card::before {
  content: '';
  position: absolute;
  top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(90deg, transparent, #c8a96e, transparent);
}

.payment-title {
  font-family: var(--serif);
  font-size: 1.85rem;
  font-weight: 600;
  margin-bottom: 0.45rem;
}
.payment-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 1.8rem; line-height: 1.55; }

.qr-box {
  width: 175px; height: 175px;
  background: #fff;
  border-radius: 14px;
  margin: 0 auto 1.4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: 0 0 26px rgba(200,169,110,0.3);
}
.qr-box svg { width: 100%; height: 100%; display: block; }

.amount-display {
  font-family: var(--mono);
  font-size: 2rem;
  font-weight: 700;
  color: #c8a96e;
  margin-bottom: 0.25rem;
}
.amount-label {
  font-size: 0.72rem;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.3rem;
}
.upi-id {
  font-family: var(--mono);
  font-size: 0.76rem;
  color: var(--muted);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 8px;
  padding: 0.55rem 0.9rem;
  margin-bottom: 1.8rem;
  letter-spacing: 0.05em;
}

/* ══════════════════════════════════════
   RESULT
══════════════════════════════════════ */
#result {
  padding: 2.5rem 1.25rem 3.5rem;
  justify-content: flex-start;
  align-items: center;
}

.result-wrapper { max-width: 660px; width: 100%; }

.result-hero {
  text-align: center;
  margin-bottom: 1.2rem;
  padding: 2.6rem 1.8rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 22px;
  position: relative;
}
.result-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 5%; right: 5%; height: 2px;
  background: linear-gradient(90deg, transparent, #c8a96e, #e8c99e, transparent);
  border-radius: 2px;
}

.personality-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #c8a96e;
  border: 1px solid rgba(200,169,110,0.28);
  background: rgba(200,169,110,0.08);
  padding: 0.35rem 0.95rem;
  border-radius: 100px;
  margin-bottom: 1.3rem;
}

.personality-type {
  font-family: var(--serif);
  font-size: clamp(1.9rem, 6.5vw, 3.6rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 1.1rem;
  background: linear-gradient(135deg, #e8c99e 0%, #c8a96e 50%, #70c8b8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  color: #c8a96e;
}

.personality-desc {
  font-size: 0.97rem;
  line-height: 1.78;
  color: rgba(240,238,232,0.78);
  max-width: 500px;
  margin: 0 auto;
}

.trait-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.55rem;
  justify-content: center;
  margin-top: 1.4rem;
}
.chip {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  padding: 0.32rem 0.85rem;
  border-radius: 100px;
  border: 1px solid;
}
.chip-gold   { color: #c8a96e; border-color: rgba(200,169,110,0.3);  background: rgba(200,169,110,0.08); }
.chip-teal   { color: #70c8b8; border-color: rgba(112,200,184,0.3);  background: rgba(112,200,184,0.06); }
.chip-purple { color: #b070e0; border-color: rgba(176,112,224,0.3); background: rgba(176,112,224,0.06); }

.result-section {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px;
  padding: 1.7rem;
  margin-bottom: 1.1rem;
  position: relative;
  transition: transform 0.18s ease;
}
.result-section:hover { transform: translateY(-2px); }
.result-section::before {
  content: '';
  position: absolute;
  top: 0; left: 6%; right: 6%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
}

.section-head {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  margin-bottom: 0.9rem;
}
.section-emoji { font-size: 1.25rem; line-height: 1; }
.section-title {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.section-body {
  font-size: 0.91rem;
  line-height: 1.8;
  color: rgba(240,238,232,0.72);
}
.section-body ul { list-style: none; display: flex; flex-direction: column; gap: 0.38rem; }
.section-body li::before { content: '→ '; color: #c8a96e; }

.score-bars { display: flex; flex-direction: column; gap: 0.85rem; }
.score-row  { display: flex; flex-direction: column; gap: 0.3rem; }
.score-meta { display: flex; justify-content: space-between; font-size: 0.78rem; }
.score-name { color: var(--muted); letter-spacing: 0.03em; }
.score-val  { font-family: var(--mono); color: #c8a96e; font-size: 0.72rem; }
.score-bar  { height: 4px; background: rgba(255,255,255,0.06); border-radius: 100px; overflow: hidden; }
.score-bar-fill {
  height: 100%;
  border-radius: 100px;
